name: drinout-prod

services:
  drinout:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      - FLASK_DEBUG=0
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    command: gunicorn --worker-class eventlet -w 1 -b 0.0.0.0:5000 "main:application"
    networks:
      - dokploy-network
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  dokploy-network:
    external: true
